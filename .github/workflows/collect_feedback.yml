name: Collect Feedback

on:
  workflow_dispatch: {}    # manual trigger only — add a schedule block to automate

permissions:
  contents: write

jobs:
  feedback:
    runs-on: ubuntu-latest
    steps:
      # This workflow commits personal job-search data back to the repo.
      # Refuse on public repos unless explicitly overridden — see job_digest.yml.
      - name: Refuse to commit personal data to a public repo
        if: ${{ !github.event.repository.private && vars.ALLOW_PUBLIC_DATA_COMMIT != 'true' }}
        run: |
          echo "::error::This workflow commits your personal job-search data (coaching_state.md, data/*.yaml) to the repository."
          echo "::error::This repository is PUBLIC, so that data would be visible to everyone."
          echo "::error::Fix: make this repository private, or set the repository variable ALLOW_PUBLIC_DATA_COMMIT=true if you truly want this."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Collect feedback from email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.feedback

      - name: Commit state changes
        run: |
          git config user.name "Job Agent"
          git config user.email "job-agent[bot]@users.noreply.github.com"
          for f in data/input_listings.yaml data/processed_listings.yaml data/processed_reply_ids.yaml coaching_state.md; do
            [ -f "$f" ] && git add -f "$f"
          done
          git diff --staged --quiet || git commit -m "chore: collect feedback $(date +%Y-%m-%d)"
          git pull --rebase
          git push
