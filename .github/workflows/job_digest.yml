name: Weekly Job Digest

on:
  workflow_dispatch: {}   # manual trigger only — add a schedule block to automate

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      # This workflow commits personal job-search data (coaching_state.md and
      # pipeline YAMLs) back to the repo. On a public repo that publishes your
      # career data to everyone. Refuse unless the repo is private or the user
      # has explicitly opted in via a repository variable.
      - name: Refuse to commit personal data to a public repo
        if: ${{ !github.event.repository.private && vars.ALLOW_PUBLIC_DATA_COMMIT != 'true' }}
        run: |
          echo "::error::This workflow commits your personal job-search data (coaching_state.md, data/*.yaml) to the repository."
          echo "::error::This repository is PUBLIC, so that data would be visible to everyone."
          echo "::error::Fix: make this repository private (Settings -> General -> Danger Zone), or set the repository variable ALLOW_PUBLIC_DATA_COMMIT=true if you truly want this."
          exit 1

      - uses: actions/checkout@v4

      - name: Check profile exists
        run: |
          if [ ! -f config/profile.yaml ]; then
            echo "::error::config/profile.yaml is not in this repository."
            echo "::error::This workflow needs a committed profile. Run the 'Profile Setup (email tier)' workflow first (Actions tab) - it creates and commits the profile."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Ingest URLs from Gmail
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          AUTHORIZED_SENDER: ${{ secrets.AUTHORIZED_SENDER }}
        run: python -m src.ingestor

      - name: Score new listings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python -m src.scout --retry-errors

      # Documents are no longer auto-prepared here — the user selects listings
      # by replying "PREPARE <numbers>" to the digest, and prepare_selected.yml
      # tailors + delivers them. Keeps API spend consent-driven.

      - name: Send digest email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: python -m src.digest

      - name: Commit state changes
        run: |
          git config user.name "Job Agent"
          git config user.email "job-agent[bot]@users.noreply.github.com"
          for f in data/input_listings.yaml data/processed_listings.yaml data/processed_reply_ids.yaml data/last_digest_map.yaml coaching_state.md; do
            [ -f "$f" ] && git add -f "$f"
          done
          git diff --staged --quiet || git commit -m "chore: weekly job digest $(date +%Y-%m-%d)"
          git pull --rebase
          git push
